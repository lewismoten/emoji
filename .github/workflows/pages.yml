name: Deploy demo to GitHub Pages

on:
  push:
    tags: ["v*", "pixel-emoji-v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Confirm tag is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pixel-font/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run bundle

      - name: Build pixel font
        run: |
          python -m pip install -r pixel-font/requirements.txt
          npm run pixel-font:build -- --fonts-only

      - name: Assemble Pages site
        run: |
          mkdir _site
          cp index.html index.js pixel-editor.js index.css emoji.json screenshot.png favicon.svg manifest.webmanifest offline.html robots.txt sitemap.xml _site/
          cp -R icons _site/icons
          cp -R dist _site/dist
          cp -R locales _site/locales
          cp -R demo-locales _site/demo-locales
          cp -R orders _site/orders
          cp -R versions _site/versions
          cp -R proposed _site/proposed
          mkdir -p _site/pixel-font
          cp -R pixel-font/build _site/pixel-font/build
          cp -R pixel-font/atlases _site/pixel-font/atlases
          npm run demo:locales -- _site
          npm run demo:pwa -- _site/service-worker.js
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
