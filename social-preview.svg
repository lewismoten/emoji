<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Emoji Explorer</title>
  <desc id="description">Social preview for the lewismoten emoji JavaScript package</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13091d"/>
      <stop offset=".52" stop-color="#210d30"/>
      <stop offset="1" stop-color="#100718"/>
    </linearGradient>
    <radialGradient id="glow" cx="24%" cy="50%" r="56%">
      <stop offset="0" stop-color="#75459b" stop-opacity=".72"/>
      <stop offset=".44" stop-color="#4a2565" stop-opacity=".34"/>
      <stop offset="1" stop-color="#160622" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="icon-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#311345"/>
      <stop offset="1" stop-color="#240d35"/>
    </linearGradient>
    <radialGradient id="face" cx="35%" cy="24%" r="80%">
      <stop offset="0" stop-color="#ffe171"/>
      <stop offset=".65" stop-color="#ffd856"/>
      <stop offset="1" stop-color="#ffd147"/>
    </radialGradient>
    <filter id="icon-shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#7c42a4" flood-opacity=".3"/>
    </filter>
    <filter id="text-shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <g filter="url(#icon-shadow)">
    <rect x="136" y="130" width="356" height="356" rx="66" fill="url(#icon-panel)"/>
    <circle cx="314" cy="299" r="110" fill="url(#face)"/>
    <ellipse cx="278" cy="277" rx="12" ry="17" fill="#4a230b"/>
    <ellipse cx="350" cy="277" rx="12" ry="17" fill="#4a230b"/>
    <path d="M260 321c16 37 34 54 54 54s38-17 54-54" fill="none" stroke="#4a230b" stroke-width="17" stroke-linecap="round"/>
  </g>

  <g filter="url(#text-shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="588" y="301" fill="#fdfaff" font-size="78" font-weight="750" letter-spacing="-2.2">Emoji Explorer</text>
    <text x="590" y="378" fill="#d9bcff" font-size="42" font-weight="650" letter-spacing="-.8">@lewismoten/emoji</text>
    <text x="590" y="448" fill="#d8c9e8" font-size="31" font-weight="400">Unicode emoji for JavaScript</text>
  </g>
</svg>
